<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Google</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="icons/x-icon" href="/icons/google-favicon.webp">
        <link rel="stylesheet" href="https://egkoppel.github.io/product-sans/google-fonts.css">
    </head>
    <body>
        <div id="logo">
            <img src="icons/google_logo.svg"/>
        </div>
        <div id="corner_icons">
            <a id="images" href="google_images/imageindex.html">Images</a>
            <img id="menu" src="icons/menu_icon.png"/>
            <img id="user" src="icons/user-icon.jpg"/>
        </div>
        <form name="form" action="https://www.google.ca/search" autocomplete="off">
            <input id="bar" id="product-sans" type="text" name="q">
            <input class="buttons" id="b1" id="product-sans" type="submit" value="Google Search" style="float: left;">
        </form>
        <form action="https://www.doodles.google">
            <input class="buttons" id="b2" id="product-sans" type="submit" value="I'm Feeling Lucky" style="float: left;">
        </form>
    </body>
</html>
