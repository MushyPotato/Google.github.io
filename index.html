<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Google</title>
        <link rel="stylesheet" href="style.css">
        <link rel="icon" type="image/x-icon" href="/images/google-favicon.webp">
        <link rel="stylesheet" href="https://egkoppel.github.io/product-sans/google-fonts.css">
    </head>
    <body>
        <div>
            <img id="icon" src="images/google_logo.svg"/>
        </div>
        <img id="user" src="images/user-icon.jpg"/>
        <a id="images" href="google_images/googleimages.html">Images</a>
        <form name="form" action="https://www.google.com/search">
            <input id="bar" id="product-sans" type="text" name="q">
            <input class="buttons" id="b1" id="product-sans" type="submit" value="Google Search" style="float: left;">
        </form>
        <form action="https://www.doodles.google">
            <input class="buttons" id="b2" id="product-sans" type="submit" value="I'm Feeling Lucky" style="float: left;">
        </form>
    </body>
</html>
